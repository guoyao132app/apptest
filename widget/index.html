<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>love</title>
  <link href="favicon.ico" rel="shortcut icon"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      body {
          overflow: hidden;
          background: #170e0a;
          font-family: 'Rajdhani', sans-serif;
      }

      canvas {
          position: fixed;
          top: 0;
          left: 0;
          z-index: 0;
      }

      div.main {
          position: fixed;
          width: 100%;
          height: 100%;
          top: 0;
          left: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          gap: 14px;
          z-index: 1;
          pointer-events: none;
          padding: 16px;
      }

      .timer-card {
          position: relative;
          background: rgba(40, 15, 10, 0.65);
          border: 1px solid rgba(255, 107, 53, 0.25);
          border-radius: 10px;
          padding: 14px 32px;
          width: 90%;
          max-width: 600px;
          text-align: center;
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          box-shadow:
              0 0 20px rgba(255, 107, 53, 0.08),
              inset 0 0 20px rgba(255, 107, 53, 0.03);
          animation: borderPulse 3s ease-in-out infinite;
      }

      .timer-card::before {
          content: '';
          position: absolute;
          top: -1px;
          left: -1px;
          right: -1px;
          bottom: -1px;
          border-radius: 12px;
          background: linear-gradient(135deg, rgba(255,107,53,0.4), transparent 40%, transparent 60%, rgba(255,107,53,0.4));
          z-index: -1;
          opacity: 0;
          animation: scanLine 4s ease-in-out infinite;
      }

      .timer-card .label {
          font-family: 'Rajdhani', sans-serif;
          font-size: 16px;
          font-weight: 500;
          color: rgba(255, 107, 53, 0.85);
          letter-spacing: 2px;
          text-transform: uppercase;
          margin-bottom: 2px;
      }

      .timer-card .startdate {
          font-family: 'Rajdhani', sans-serif;
          font-size: 13px;
          font-weight: 400;
          color: rgba(255, 107, 53, 0.75);
          letter-spacing: 1px;
          margin-bottom: 6px;
      }

      .timer-card .days {
          font-family: 'Orbitron', monospace;
          font-size: 34px;
          font-weight: 900;
          color: #fff;
          text-shadow: 0 0 20px rgba(255, 107, 53, 0.6), 0 0 40px rgba(255, 107, 53, 0.3);
          margin-bottom: 2px;
      }

      .timer-card .days .unit {
          font-size: 14px;
          font-weight: 400;
          color: rgba(255, 107, 53, 0.7);
          margin-left: 4px;
      }

      .timer-card .detail {
          font-family: 'Orbitron', monospace;
          font-size: 14px;
          font-weight: 400;
          color: rgba(255, 255, 255, 0.6);
          letter-spacing: 1px;
      }

      .timer-card .detail .num {
          color: #ff6b35;
          font-weight: 700;
          text-shadow: 0 0 8px rgba(255, 107, 53, 0.5);
      }

      @keyframes borderPulse {
          0%, 100% { border-color: rgba(255, 107, 53, 0.2); box-shadow: 0 0 20px rgba(255, 107, 53, 0.05), inset 0 0 20px rgba(255, 107, 53, 0.02); }
          50% { border-color: rgba(255, 107, 53, 0.5); box-shadow: 0 0 30px rgba(255, 107, 53, 0.15), inset 0 0 30px rgba(255, 107, 53, 0.05); }
      }

      @keyframes scanLine {
          0%, 100% { opacity: 0; }
          50% { opacity: 1; }
      }

      @media (max-width: 768px) {
          div.main {
              gap: 16px;
              padding: 16px;
          }

          .timer-card {
              padding: 20px 28px;
          }

          .timer-card .label {
              font-size: 15px;
              letter-spacing: 2px;
          }

          .timer-card .days {
              font-size: 34px;
          }

          .timer-card .days .unit {
              font-size: 16px;
          }

          .timer-card .detail {
              font-size: 14px;
          }
      }

      @media (max-width: 480px) {
          div.main {
              gap: 12px;
              padding: 12px;
          }

          .timer-card {
              padding: 10px 18px;
              border-radius: 8px;
          }

          .timer-card .label {
              font-size: 13px;
              letter-spacing: 1px;
              margin-bottom: 6px;
          }

          .timer-card .days {
              font-size: 28px;
              margin-bottom: 2px;
          }

          .timer-card .days .unit {
              font-size: 14px;
          }

          .timer-card .detail {
              font-size: 11px;
              letter-spacing: 0;
              line-height: 1.8;
          }
      }

      @media (max-width: 360px) {
          .timer-card {
              padding: 12px 14px;
          }

          .timer-card .label {
              font-size: 12px;
          }

          .timer-card .days {
              font-size: 24px;
          }

          .timer-card .detail {
              font-size: 10px;
          }
      }

      @media (max-height: 600px) and (orientation: landscape) {
          div.main {
              gap: 8px;
              padding: 8px;
          }

          .timer-card {
              padding: 10px 24px;
          }

          .timer-card .label {
              font-size: 12px;
              margin-bottom: 2px;
          }

          .timer-card .days {
              font-size: 24px;
              margin-bottom: 0;
          }

          .timer-card .detail {
              font-size: 11px;
          }
      }
  </style>
</head>
<body>
<div class="main" id="timers"></div>
<canvas></canvas>
<script src="./script/moment.min.js"></script>
<script>
  var canvas = document.querySelector("canvas"),
    ctx = canvas.getContext("2d");
  var ww, wh;

  function onResize() {
    ww = canvas.width = window.innerWidth;
    wh = canvas.height = window.innerHeight;
  }

  var precision = 100;
  var hearts = [];
  var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  var MAX_HEARTS = isMobile ? 80 : 200;

  var sharedVertices = [];
  (function () {
    for (var i = 0; i < precision; i++) {
      var step = (i / precision - 0.5) * (Math.PI * 2);
      sharedVertices.push({
        x: 15 * Math.pow(Math.sin(step), 3),
        y: -(13 * Math.cos(step) - 5 * Math.cos(2 * step) - 2 * Math.cos(3 * step) - Math.cos(4 * step))
      });
    }
  })();

  function onMove(e) {
    if (hearts.length >= MAX_HEARTS) return;
    e.preventDefault();
    var x, y;
    if (e.type === "touchmove") {
      x = e.touches[0].clientX;
      y = e.touches[0].clientY;
    } else {
      x = e.clientX;
      y = e.clientY;
    }
    hearts.push(new Heart(x, y));
    if (!isMobile) {
      hearts.push(new Heart(x, y));
    }
  }

  var Heart = function (x, y) {
    this.x = x || Math.random() * ww;
    this.y = y || Math.random() * wh;
    this.size = Math.random() * 2 + 1;
    this.speedX = (Math.random() + 0.2 - 0.6) * 8;
    this.speedY = (Math.random() + 0.2 - 0.6) * 8;
    this.speedSize = Math.random() * 0.05 + 0.01;
  };

  Heart.prototype.draw = function () {
    this.size -= this.speedSize;
    this.x += this.speedX;
    this.y += this.speedY;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(this.size, this.size);
    ctx.beginPath();
    for (var i = 0; i < precision; i++) {
      var vector = sharedVertices[i];
      ctx.lineTo(vector.x, vector.y);
    }
    ctx.globalAlpha = this.size;
    ctx.shadowBlur = Math.round((3 - this.size) * 10);
    ctx.shadowColor = "hsla(15, 100%, 55%, 0.5)";
    ctx.globalCompositeOperation = "screen";
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  };

  function render() {
    requestAnimationFrame(render);
    if (hearts.length < MAX_HEARTS) {
      hearts.push(new Heart());
    }
    ctx.clearRect(0, 0, ww, wh);
    for (var i = hearts.length - 1; i >= 0; i--) {
      hearts[i].draw();
      if (hearts[i].size <= 0) {
        hearts.splice(i, 1);
      }
    }
  }

  onResize();
  window.addEventListener("mousemove", onMove);
  window.addEventListener("touchmove", onMove, { passive: false });
  window.addEventListener("touchstart", function (e) { e.preventDefault(); }, { passive: false });
  window.addEventListener("resize", onResize);
  requestAnimationFrame(render);

  var timerList = [
    { date: '2020,4,10', label: 'Yoo & Ten · 我们已经在一起' },
    { date: '2022,10,1', label: 'Yoo & Ten · 婚礼纪念日' },
    { date: '2023,5,10', label: 'Yoo & Ten · 领证纪念日' },
    { date: '2014,7,21 8:45:00', label: '豆豆 · 6月25(阳历7.21)' },
    { date: '2024,4,19 8:28:00', label: '羽儿 · 3月11(阳历4.19)' }
  ];

  var timerContainer = document.getElementById('timers');
  timerList.forEach(function (item) {
    var card = document.createElement('div');
    card.className = 'timer-card';
    card.innerHTML = '<div class="label"></div><div class="startdate"></div><div class="days"></div><div class="detail"></div>';
    timerContainer.appendChild(card);
    item.card = card;
  });

  window.onload = function starttime() {
    timerList.forEach(function (item) {
      time(item);
    });
    setTimeout(starttime, 1000);
  };

  function time(item) {
    var nowDate = new Date();
    var futruetime = new Date(item.date).getTime();
    var msec = nowDate.getTime() - futruetime;
    var day = parseInt(msec / 86400000);

    var msg = moment(item.date).preciseDiff(nowDate, true);
    var card = item.card;
    card.querySelector('.label').textContent = item.label;
    var sd = new Date(item.date);
    card.querySelector('.startdate').textContent = '起始于 ' + sd.getFullYear() + '年' + (sd.getMonth() + 1) + '月' + sd.getDate() + '日';
    card.querySelector('.days').innerHTML = day + '<span class="unit">天</span>';

    var detailParts = [];
    if (msg.years > 0) detailParts.push('<span class="num">' + msg.years + '</span> 年');
    if (msg.months > 0) detailParts.push('<span class="num">' + msg.months + '</span> 月');
    if (msg.days > 0) detailParts.push('<span class="num">' + msg.days + '</span> 天');
    detailParts.push('<span class="num">' + msg.hours + '</span> 时');
    detailParts.push('<span class="num">' + msg.minutes + '</span> 分');
    detailParts.push('<span class="num">' + msg.seconds + '</span> 秒');
    card.querySelector('.detail').innerHTML = detailParts.join(' ');
  }
</script>
</body>
</html>
